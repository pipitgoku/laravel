#Volume
#       Storage   : docker volume create pelatihan-storage
#       Database  : docker volume create pelatihan-mysql
#Build  : docker-compose build
#Run    : docker-compose up
#Stop   : docker stop pelatihan11 | docker stop pelatihan11-mysql

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: pelatihan11:1.0.0
    container_name: pelatihan11 # ${APP}
    ports:
      - 8086:80
    restart: always # no | on-failure | always | unless-stopped
    user: www-data #--Optional for production
    volumes:
      - pelatihan-storage:/var/www/html/storage
      # - /home/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    # networks:
    #   - pelatihan-network
    command: >
      sh -c "
      chown -R www-data:www-data /var/www/html/ &&
      chmod -R 775 /var/www/html/storage
      "
    depends_on:
         - db
  db:
    image: pelatihan11-mysql:1.0.0
    build:
        dockerfile: dockerfile.mysql
    container_name: pelatihan11-mysql
    ports:
      - 3321:3306
    volumes:
      - pelatihan-mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=pipitgoku
      - MYSQL_DATABASE=pelatihan
    restart: always

volumes:
  pelatihan-storage:
    # external : true
    driver: local
  pelatihan-mysql:
    # external : true
    driver: local

# networks:
#   pelatihan-network :
#     external: true
